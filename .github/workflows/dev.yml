name: Terraform Dev Deployment


on:
  push:
    branches:
      - dev

  workflow_dispatch:
    inputs:
      environment:
        description: 'dev'
        required: true
        type: choice
        options:
          - dev

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Verify Secrets
        run: |
          echo "environment : ${{ github.event.inputs.environment }}"
          echo "Client ID present: ${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "Tenant ID present: ${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "Subscription ID present: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Secret Exists
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "AZURE_CREDENTIALS is empty"
            exit 1
          else
            echo "AZURE_CREDENTIALS exists"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify Files
        run: |
          pwd
          ls -la
          find . -name "*.tf"

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        run: |
          terraform workspace select ${{ github.event.inputs.environment }} || \
          terraform workspace new ${{ github.event.inputs.environment }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # For manual approval:
      # Create GitHub Environments (dev/uat/prod)
      # and configure Required Reviewers on uat/prod.
      # The workflow will pause automatically before this step.
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan